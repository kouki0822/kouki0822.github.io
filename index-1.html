<!DOCTYPE html>
<!--
  ╔══════════════════════════════════════════════════════════════╗
  ║  小さいラボ  -  index.html（トップページ／表示専用）          ║
  ║                                                              ║
  ║  ★ アプリの中身は apps.js にあります。                        ║
  ║    ふだんの追加・編集は admin.html（管理ページ）から。        ║
  ╚══════════════════════════════════════════════════════════════╝
-->
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>小さいラボ — つくっては放出する実験室</title>
  <meta name="description" content="AIと一緒に、小さなアプリやWebアプリをつくっては放出していく実験室です。気軽に使ってみてください。" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Zen+Kaku+Gothic+New:wght@400;500;700;900&display=swap" rel="stylesheet" />

  <style>
    :root {
      --paper:#FBFAF6; --ink:#16213E; --grid:rgba(22,33,62,0.06);
      --accent:#2F5BFF; --marker:#FFD23F; --muted:#5B647E;
      --line:rgba(22,33,62,0.14); --card:#FFFFFF;
    }
    * { box-sizing:border-box; margin:0; padding:0; }
    body {
      font-family:"Zen Kaku Gothic New", system-ui, -apple-system, sans-serif;
      color:var(--ink); background-color:var(--paper);
      background-image:linear-gradient(var(--grid) 1px,transparent 1px),
                       linear-gradient(90deg,var(--grid) 1px,transparent 1px);
      background-size:26px 26px; line-height:1.7; -webkit-font-smoothing:antialiased;
    }
    .wrap { max-width:940px; margin:0 auto; padding:0 24px; }
    .mono { font-family:"Space Mono", monospace; }

    header { padding:84px 0 56px; border-bottom:2px solid var(--ink); }
    .eyebrow { font-family:"Space Mono",monospace; font-size:13px; letter-spacing:.22em;
               color:var(--accent); text-transform:uppercase; margin-bottom:20px; }
    h1 { font-size:clamp(40px,9vw,76px); font-weight:900; letter-spacing:-.01em; line-height:1.1; }
    h1 .hl { background:linear-gradient(transparent 58%,var(--marker) 58%,var(--marker) 92%,transparent 92%); padding:0 .06em; }
    .tagline { font-size:clamp(17px,2.6vw,21px); font-weight:500; margin-top:26px; max-width:30em; }
    .lead { color:var(--muted); margin-top:14px; max-width:34em; }
    .counter { font-family:"Space Mono",monospace; display:inline-flex; align-items:baseline; gap:8px;
               margin-top:30px; font-size:14px; border:1.5px solid var(--ink); padding:8px 14px; background:var(--card); }
    .counter b { font-size:18px; color:var(--accent); }

    main { padding:56px 0 40px; }
    .section-label { font-family:"Space Mono",monospace; font-size:13px; letter-spacing:.18em;
                     color:var(--muted); text-transform:uppercase; margin-bottom:28px; display:flex; align-items:center; gap:14px; }
    .section-label::after { content:""; flex:1; height:1px; background:var(--line); }

    .grid { display:grid; grid-template-columns:repeat(2,1fr); gap:22px; }
    @media (max-width:640px){ .grid { grid-template-columns:1fr; } }

    .card { position:relative; background:var(--card); border:1.5px solid var(--line);
            border-radius:10px; padding:0 0 22px; overflow:hidden; display:flex; flex-direction:column;
            transition:transform .18s ease, box-shadow .18s ease, border-color .18s ease; }
    .experiment:hover { transform:translateY(-4px); box-shadow:6px 8px 0 rgba(22,33,62,.08); border-color:var(--ink); }
    .thumb { width:100%; aspect-ratio:16/9; background:var(--paper); border-bottom:1.5px solid var(--line); overflow:hidden; }
    .thumb img { width:100%; height:100%; object-fit:cover; display:block; }
    .card-body { padding:24px 24px 0; display:flex; flex-direction:column; flex:1; }
    .no { font-family:"Space Mono",monospace; font-size:12px; letter-spacing:.1em; color:var(--accent); margin-bottom:12px; }
    .card h3 { font-size:22px; font-weight:700; margin-bottom:8px; }
    .card p { color:var(--muted); font-size:15px; margin-bottom:16px; flex:1; }
    .tags { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:18px; }
    .tag { font-family:"Space Mono",monospace; font-size:11px; color:var(--muted);
           border:1px solid var(--line); border-radius:999px; padding:3px 10px; }
    .actions { display:flex; gap:10px; flex-wrap:wrap; }
    .btn { font-weight:700; font-size:14px; text-decoration:none; padding:9px 16px; border-radius:7px; transition:opacity .15s, background .15s; }
    .btn-primary { background:var(--accent); color:#fff; }
    .btn-primary:hover { opacity:.85; }
    .btn-ghost { background:transparent; color:var(--ink); border:1.5px solid var(--ink); }
    .btn-ghost:hover { background:var(--ink); color:var(--paper); }

    .empty { grid-column:1/-1; text-align:center; color:var(--muted); padding:60px 20px;
             border:1.5px dashed var(--line); border-radius:10px; }

    footer { border-top:2px solid var(--ink); padding:40px 0 60px; margin-top:30px;
             display:flex; flex-wrap:wrap; align-items:center; justify-content:space-between; gap:16px; }
    footer a { color:var(--accent); font-weight:700; text-decoration:none; }
    footer a:hover { text-decoration:underline; }
    .copy { font-family:"Space Mono",monospace; font-size:12px; color:var(--muted); }

    a:focus-visible { outline:3px solid var(--accent); outline-offset:3px; border-radius:4px; }

    .fade { opacity:0; transform:translateY(14px); animation:rise .6s ease forwards; }
    @keyframes rise { to { opacity:1; transform:translateY(0); } }
    @media (prefers-reduced-motion:reduce){ *{animation:none!important;transition:none!important;} .fade{opacity:1;transform:none;} }
  </style>
</head>

<body>
  <header>
    <div class="wrap">
      <p class="eyebrow fade">Experiment Log</p>
      <h1 class="fade"><span class="hl">小さいラボ</span></h1>
      <p class="tagline fade">AIと一緒に、小さなアプリをつくっては放出していく実験室。</p>
      <p class="lead fade">思いついたものを片っぱしから形にして、ここに並べていきます。コードは全部GitHubで公開中。気軽に使ってみてください。</p>
      <span class="counter fade">公開中の実験 <b id="count">0</b> 個</span>
    </div>
  </header>

  <main>
    <div class="wrap">
      <p class="section-label">Released / 公開中</p>
      <!-- ここはJavaScriptが apps.js を読んで自動でカードを並べます -->
      <div class="grid" id="grid"></div>
    </div>
  </main>

  <footer>
    <div class="wrap" style="display:flex; flex-wrap:wrap; align-items:center; justify-content:space-between; gap:16px; width:100%;">
      <div style="display:flex; gap:24px; flex-wrap:wrap;">
        <a href="https://github.com/kouki0822" target="_blank" rel="noopener">GitHub →</a>
        <a href="about.html" target="_blank" rel="noopener">うp主について →</a>
        <a href="admin.html">管理ページ →</a>
      </div>
      <span class="copy">© 2026 小さいラボ</span>
    </div>
  </footer>

  <!-- データを読み込む -->
  <script src="apps.js"></script>
  <!-- データを使ってカードを描く -->
  <script>
    // HTMLに紛れ込むと困る文字を安全な形に変換する小さな関数
    function esc(s){ return String(s==null?"":s)
      .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

    const grid = document.getElementById("grid");
    const all  = (typeof APPS !== "undefined") ? APPS : [];
    const published = all.filter(a => a.published);   // 公開中だけ取り出す

    if (published.length === 0) {
      grid.innerHTML = '<div class="empty">まだ公開中の実験はありません。<br>管理ページから追加してください。</div>';
    } else {
      grid.innerHTML = published.map((a, i) => {
        const no    = "No." + String(i + 1).padStart(3, "0");
        const thumb = a.thumbnail
          ? `<div class="thumb"><img src="${esc(a.thumbnail)}" alt="${esc(a.title)}"></div>` : "";
        const tags  = (a.tags || []).map(t => `<span class="tag">${esc(t)}</span>`).join("");
        const useBtn = a.appUrl
          ? `<a class="btn btn-primary" href="${esc(a.appUrl)}" target="_blank" rel="noopener">使ってみる</a>` : "";
        const ghBtn  = a.githubUrl
          ? `<a class="btn btn-ghost" href="${esc(a.githubUrl)}" target="_blank" rel="noopener">GitHub</a>` : "";
        return `<article class="card experiment">${thumb}
          <div class="card-body">
            <span class="no">${no}</span>
            <h3>${esc(a.title)}</h3>
            <p>${esc(a.description)}</p>
            <div class="tags">${tags}</div>
            <div class="actions">${useBtn}${ghBtn}</div>
          </div></article>`;
      }).join("");
    }
    document.getElementById("count").textContent = published.length;
  </script>
</body>
</html>
